[package]
name = "custom-async"
version = "0.1.0"
edition = "2021"

[dependencies]
futures-util = "0.3.32"
libc = "0.2.176"
mio = { version = "1.1.1", features = ["os-poll", "os-ext"] }
parking_lot = "0.12.5"
slab = "0.4.12"
tokio = { version = "1.49.0", features = ["io-util"] }

[target.'cfg(target_os = "linux")'.dependencies]
io-uring = "0.7.11"
