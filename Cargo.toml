[package]
name = "custom-async"
version = "0.1.0"
edition = "2021"

[dependencies]
crossbeam-queue = "0.3.12"
futures-util = "0.3.32"
libc = "0.2.176"
mio = { version = "1.1.1", features = ["os-poll", "os-ext"] }
tokio = { version = "1.49.0", features = ["io-util"] }

[target.'cfg(target_os = "linux")'.dependencies]
io-uring = "0.7.11"
